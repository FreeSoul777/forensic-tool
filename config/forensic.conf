# Конфигурационный файл forensic-tool
# Можно разместить в:
#   /etc/forensic/forensic.conf    (системный)
#   ~/.config/forensic/forensic.conf (пользовательский)
#   ./forensic.conf                 (локальный)
#   /app/config/forensic.conf       (в контейнере)

[forensic]
# ========== ОСНОВНЫЕ НАСТРОЙКИ ==========

# Уровень логирования: DEBUG, INFO, WARNING, ERROR
log_level = INFO

# Выводить логи в консоль?
verbose = false

# Директория для сессий
session_dir = /tmp/forensic_sessions

# ========== НАСТРОЙКИ ЛОГГЕРА ==========

# Максимальный размер лог-файла в байтах (10 MB)
max_log_size = 10485760

# Сколько хранить backup логов (старых файлов)
# 0 - не хранить backup, 5 - хранить 5 старых файлов
log_backup_count = 5

# Сколько дней хранить сессии (0 - хранить вечно)
session_retention_days = 5